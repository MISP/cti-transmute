<div class="conv-sidebar" id="conv-sidebar">

  <!-- Quick search -->
  <div class="conv-sidebar-search">
    <div class="conv-sidebar-search-label">Search Converts</div>
    <div class="conv-sidebar-search-box">
      <i class="fas fa-search conv-sidebar-search-icon"></i>
      <input
        id="sidebar-search-input"
        class="conv-sidebar-search-input"
        type="text"
        placeholder="Name, description, content…"
        @input="onSidebarSearch"
        v-model="sidebarQuery"
        @keyup.enter="onSidebarSearch">
      <button v-if="sidebarQuery" class="conv-sidebar-search-clear" @click="clearSidebarSearch" title="Clear">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div v-if="sidebarQuery" class="conv-sidebar-search-hint">
      <i class="fas fa-info-circle me-1"></i>
      Press <kbd>↵</kbd> or wait to search
    </div>
  </div>

  <div class="conv-sidebar-divider"></div>

  <!-- Active filters summary -->
  <div class="conv-sidebar-section">
    <div class="conv-sidebar-section-label">Active Filters</div>
    <div v-if="!filter_type && !searchQuery && !date_from && !date_to" class="conv-sidebar-empty">
      No filters applied
    </div>
    <div v-else class="conv-sidebar-chips">
      <span v-if="searchQuery" class="conv-sidebar-chip">
        <i class="fas fa-search me-1"></i>[[ searchQuery ]]
        <button @click="searchQuery=''; onSearchInput()"><i class="fas fa-times"></i></button>
      </span>
      <span v-if="filter_type" class="conv-sidebar-chip">
        <i class="fas fa-exchange-alt me-1"></i>[[ filter_type.replace('_',' → ') ]]
        <button @click="filter_type=''; onSearchInput()"><i class="fas fa-times"></i></button>
      </span>
      <span v-if="date_from" class="conv-sidebar-chip">
        <i class="fas fa-calendar me-1"></i>From [[ date_from ]]
        <button @click="date_from=''; onSearchInput()"><i class="fas fa-times"></i></button>
      </span>
      <span v-if="date_to" class="conv-sidebar-chip">
        <i class="fas fa-calendar me-1"></i>To [[ date_to ]]
        <button @click="date_to=''; onSearchInput()"><i class="fas fa-times"></i></button>
      </span>
    </div>
  </div>

  <div class="conv-sidebar-divider"></div>

  <!-- Type filter -->
  <div class="conv-sidebar-section">
    <div class="conv-sidebar-section-label">Type</div>
    <div class="conv-sidebar-options">
      <button class="conv-sidebar-opt" :class="{active: filter_type===''}" @click="filter_type=''; onSearchInput()">
        <i class="fas fa-layer-group me-2"></i>All
      </button>
      <button class="conv-sidebar-opt" :class="{active: filter_type==='MISP_TO_STIX'}" @click="filter_type='MISP_TO_STIX'; onSearchInput()">
        <i class="fas fa-arrow-right me-2"></i>MISP → STIX
      </button>
      <button class="conv-sidebar-opt" :class="{active: filter_type==='STIX_TO_MISP'}" @click="filter_type='STIX_TO_MISP'; onSearchInput()">
        <i class="fas fa-arrow-left me-2"></i>STIX → MISP
      </button>
    </div>
  </div>

  <div class="conv-sidebar-divider"></div>

  <!-- Sort -->
  <div class="conv-sidebar-section">
    <div class="conv-sidebar-section-label">Sort</div>
    <div class="conv-sidebar-options">
      <button class="conv-sidebar-opt" :class="{active: sort_order==='desc'}" @click="sort_order='desc'; onSearchInput()">
        <i class="fas fa-sort-amount-down me-2"></i>Newest first
      </button>
      <button class="conv-sidebar-opt" :class="{active: sort_order==='asc'}" @click="sort_order='asc'; onSearchInput()">
        <i class="fas fa-sort-amount-up me-2"></i>Oldest first
      </button>
    </div>
  </div>

</div>
