{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/list.css') }}">
{% endblock %}
{% block content %}
<div id="list-container" v-cloak>

    <!-- Header -->
    <div class="list-header">
        <div class="home-hero-badge">
            <i class="fas fa-plug"></i> REST API
        </div>
        <h1 class="list-title">Available Converters</h1>
        <p class="list-subtitle">
            Browse all conversion endpoints and their accepted parameters.
            Use them directly via HTTP or through the UI.
        </p>
    </div>

    <!-- Loaded -->
    <template v-if="is_loading">
        <div v-if="list_feature && Object.keys(list_feature).length > 0" class="list-grid">
            <div v-for="(feature, path) in list_feature" :key="path" class="list-card" @click="goTo(path)">
                <!-- Left icon -->
                <div class="list-card-icon" :class="iconClass(feature.method)">
                    <i :class="iconName(path)"></i>
                </div>

                <!-- Body -->
                <div class="list-card-body">
                    <div class="list-card-top">
                        <span class="list-card-path">[[ path ]]</span>
                        <span class="home-badge" :class="badgeClass(feature.method)">[[ feature.method ]]</span>
                    </div>
                    <p class="list-card-desc">[[ feature.description ]]</p>

                    <!-- Parameters -->
                    <div v-if="feature.parameters && feature.parameters.length > 0" class="list-params">
                        <div class="list-params-label">Parameters</div>
                        <div class="list-params-grid">
                            <div v-for="param in feature.parameters" :key="param.name" class="list-param-chip">
                                <span class="list-param-name">[[ param.name ]]</span>
                                <span class="list-param-type">[[ param.type || 'any' ]]</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Arrow -->
                <div class="home-card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <!-- Empty / error -->
        <div v-else class="list-empty">
            <i class="fas fa-circle-exclamation list-empty-icon"></i>
            <p class="list-empty-text">No converters available or failed to load.</p>
        </div>
    </template>


</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref } = Vue
    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const list_feature = ref({})

            const URL_MAP = {
                '/api/convert/list': '/list',
                '/api/convert/misp_to_stix': '/convert/misp_to_stix',
                '/api/convert/stix_to_misp': '/convert/stix_to_misp',
            }

            const is_loading = ref(false)
            async function fetch_features() {
                try {
                    const res = await fetch('/get_features')
                    const data = await res.json()
                    if (data.status === 'success') list_feature.value = data.features
                    is_loading.value = true
                } catch (e) {
                    is_loading.value = false
                }

            }

            function goTo(path) {
                const url = URL_MAP[path]
                if (url) window.location.href = url
                else console.warn('No URL mapped for', path)
            }

            function badgeClass(method) {
                return method === 'GET' ? 'home-badge--get' : 'home-badge--post'
            }

            function iconClass(method) {
                return method === 'GET' ? 'list-card-icon--slate' : 'list-card-icon--blue'
            }

            function iconName(path) {
                if (path.includes('misp_to_stix')) return 'fas fa-arrow-right-arrow-left'
                if (path.includes('stix_to_misp')) return 'fas fa-arrow-right-arrow-left fa-flip-horizontal'
                return 'fas fa-list-ul'
            }

            fetch_features()
            return { list_feature, goTo, badgeClass, iconClass, iconName, is_loading }
        }
    }).mount('#list-container')
</script>
{% endblock %}
